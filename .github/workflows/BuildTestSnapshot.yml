name: Build, test and snapshot

on:
  push:
    branches:
      - 'task/**'
      - 'bug/**'
      - 'fix/**'
      - 'epic/**'
      - 'staging'
  pull_request:
    branches:
      - 'staging'
    types: [ closed ]

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore gradle.properties
        env:
          W3W_PRE_PROD_URL: ${{ secrets.W3W_PRE_PROD_URL }}
          PRE_PROD_API_KEY: ${{ secrets.PRE_PROD_API_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "W3W_PRE_PROD_URL=${W3W_PRE_PROD_URL}" >> ~/.gradle/gradle.properties
          echo "PRE_PROD_API_KEY=${PRE_PROD_API_KEY}" >> ~/.gradle/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Lib
        run: ./gradlew lib:build --refresh-dependencies

      - name: Run unit tests, coverage and Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew lib:testDebugUnitTest jacocoTestReport sonarqube

      - name: Store unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: lib/build/test-results/testDebugUnitTest

  instrumented_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore gradle.properties
        env:
          W3W_PRE_PROD_URL: ${{ secrets.W3W_PRE_PROD_URL }}
          PRE_PROD_API_KEY: ${{ secrets.PRE_PROD_API_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "W3W_PRE_PROD_URL=${W3W_PRE_PROD_URL}" >> ~/.gradle/gradle.properties
          echo "PRE_PROD_API_KEY=${PRE_PROD_API_KEY}" >> ~/.gradle/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew lib:connectedDebugAndroidTest

      - name: Store instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: lib/build/outputs/androidTest-results

  snapshot:
    # This job must explicitly depend on build_test
    needs: build_test
    # Run for direct commits to the staging branch OR when PRs are merged into staging
    # AND only when build_test succeeds
    if: >
      success() && 
      ((github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
       (github.event_name == 'pull_request' && github.event.action == 'closed' && 
        github.event.pull_request.merged == true && github.base_ref == 'staging'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore gradle.properties
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "MAVEN_CENTRAL_USERNAME=${MAVEN_CENTRAL_USERNAME}" >> ~/.gradle/gradle.properties
          echo "MAVEN_CENTRAL_PASSWORD=${MAVEN_CENTRAL_PASSWORD}" >> ~/.gradle/gradle.properties
          echo "IS_SNAPSHOT_RELEASE=true" >> ~/.gradle/gradle.properties

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Publish SNAPSHOT
        run: ./gradlew lib:publishMavenPublicationToSonatypeSnapshotsRepository --refresh-dependencies
